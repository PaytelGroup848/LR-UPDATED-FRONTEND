services:
  guac-db:
    image: mysql:8.4
    container_name: lr-guac-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: guacamole_root
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole
      MYSQL_PASSWORD: guacamole
    volumes:
      - guac-db-data:/var/lib/mysql
      - ./guacamole/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uguacamole", "-pguacamole"]
      interval: 10s
      timeout: 5s
      retries: 12

  guacd:
    image: guacamole/guacd:1.5.5
    container_name: lr-guacd
    restart: unless-stopped

  guacamole:
    build:
      context: .
      dockerfile: guacamole/Dockerfile
    image: lr-guacamole:1.5.5
    container_name: lr-guacamole
    restart: unless-stopped
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_HOSTNAME: guac-db
      MYSQL_DATABASE: guacamole_db
      MYSQL_USER: guacamole
      MYSQL_PASSWORD: guacamole
    ports:
      - "8080:8080"
    depends_on:
      guac-db:
        condition: service_healthy
      guacd:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: lr-api-gateway
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      LICENSE_SERVICE_URL: http://license-service:8003
      WEB_BACKEND_URL: http://web-backend:8004
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      license-service:
        condition: service_started
      web-backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lr-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://191.44.87.38:8000}
      BACKEND_PROXY_URL: http://api-gateway:8000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api-gateway:
        condition: service_started

  web-backend:
    build:
      context: .
      dockerfile: services/web-backend/Dockerfile
    container_name: lr-web-backend
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL:?MONGODB_URL is required}
      MONGODB_DATABASE: ${MONGODB_DATABASE:?MONGODB_DATABASE is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-${SECRET_KEY:?SECRET_KEY is required}}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      SOCKETIO_CORS_ORIGINS: ${SOCKETIO_CORS_ORIGINS:-${CORS_ORIGINS:?CORS_ORIGINS is required}}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      LR_SERVER_URL: ${LR_SERVER_URL:-${WEB_BACKEND_PUBLIC_URL:-http://191.44.87.38:8004}}
      LR_BACKEND_URL: ${LR_BACKEND_URL:-${WEB_BACKEND_PUBLIC_URL:-http://191.44.87.38:8004}}
      PORTAL_HOME_URL: ${PORTAL_HOME_URL:-/portal}
      GUACAMOLE_URL: ${GUACAMOLE_URL:?GUACAMOLE_URL is required}
      GUACAMOLE_PUBLIC_URL: ${GUACAMOLE_PUBLIC_URL:?GUACAMOLE_PUBLIC_URL is required}
      GUACAMOLE_USER: ${GUACAMOLE_USER:?GUACAMOLE_USER is required}
      GUACAMOLE_PASSWORD: ${GUACAMOLE_PASSWORD:?GUACAMOLE_PASSWORD is required}
      GUACAMOLE_DATA_SOURCE: ${GUACAMOLE_DATA_SOURCE:?GUACAMOLE_DATA_SOURCE is required}
    ports:
      - "${WEB_BACKEND_PORT:-8004}:8004"
    expose:
      - "8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - ./backend/static:/app/backend/static

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: lr-auth-service
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL:?MONGODB_URL is required}
      MONGODB_DATABASE: ${MONGODB_DATABASE:?MONGODB_DATABASE is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-${SECRET_KEY:?SECRET_KEY is required}}
      ALGORITHM: ${ALGORITHM:?ALGORITHM is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:?ACCESS_TOKEN_EXPIRE_MINUTES is required}
    expose:
      - "8001"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: lr-user-service
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL:?MONGODB_URL is required}
      MONGODB_DATABASE: ${MONGODB_DATABASE:?MONGODB_DATABASE is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-${SECRET_KEY:?SECRET_KEY is required}}
      ALGORITHM: ${ALGORITHM:?ALGORITHM is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:?ACCESS_TOKEN_EXPIRE_MINUTES is required}
    expose:
      - "8002"

  license-service:
    build:
      context: .
      dockerfile: services/license-service/Dockerfile
    container_name: lr-license-service
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL:?MONGODB_URL is required}
      MONGODB_DATABASE: ${MONGODB_DATABASE:?MONGODB_DATABASE is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-${SECRET_KEY:?SECRET_KEY is required}}
      ALGORITHM: ${ALGORITHM:?ALGORITHM is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:?ACCESS_TOKEN_EXPIRE_MINUTES is required}
    expose:
      - "8003"

volumes:
  guac-db-data:
